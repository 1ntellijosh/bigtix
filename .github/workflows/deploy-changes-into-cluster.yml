###
# Deploy EKS cluster (and nodegroup) to AWS. This workflow is triggered by a merge into the main branch
#
# @since cleanups-and-updates--JP
###

# - main

name: Deploy Changed Resources into EKS Cluster

on:
  push:
    branches:
      - cleanups-and-updates--JP

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME }}
  ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}

permissions:
  id-token: write
  contents: read

jobs:
# Always run first, to ensure cluster is ready
  deploy-cluster-infra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Ensure messaging namespace exists
        run: kubectl create namespace messaging --dry-run=client -o yaml | kubectl apply -f -

      - name: Sync secrets from AWS Secrets Manager to Kubernetes Secrets
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
        run: |
          chmod +x ops/scripts/sync-secrets-from-aws.sh
          ./ops/scripts/sync-secrets-from-aws.sh

# Build shared packages, and add as artifacts to the workflow
  build-shared-packages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build shared packages
        run: |
          npm install
          cd packages/common && npm run build
          cd ../..
          cd packages/middleware && npm run build

      - name: Upload shared packages
        uses: actions/upload-artifact@v4
        with:
          name: shared-packages
          path: |
            packages/common
            packages/middleware

# Deploy auth-srv to EKS if changes are detected
  deploy-auth-to-eks:
    needs: [deploy-cluster-infra, build-shared-packages]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: shared-packages
          path: packages

      - name: Detect changes
        id: detect
        run: |
          changes=$(git diff --name-only ${{ github.event.before }} ${{ github.event.after }} | grep -E '^(auth-srv/|packages/)' || true)
          if [ -z "$changes" ]; then
            echo "No changes detected in auth-srv or packages"
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "Changes detected in auth-srv or packages"
          echo "$changes"
          echo "has_changes=true" >> $GITHUB_OUTPUT
          exit 0
      
      - uses: aws-actions/configure-aws-credentials@v4
        if: steps.detect.outputs.has_changes == 'true'
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      
      - run: aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}
        if: steps.detect.outputs.has_changes == 'true'

      - run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}
        if: steps.detect.outputs.has_changes == 'true'

      - name: Build and push auth-srv image to ECR
        if: steps.detect.outputs.has_changes == 'true'
        run: |
          docker build -f auth-srv/deploy/docker/prod.Dockerfile -t ${{ env.ECR_REGISTRY }}/bigtix/auth-srv:${{ github.sha }} .
          docker push ${{ env.ECR_REGISTRY }}/bigtix/auth-srv:${{ github.sha }}

      - name: Install yq
        if: steps.detect.outputs.has_changes == 'true'
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Deploy auth-srv to EKS
        if: steps.detect.outputs.has_changes == 'true'
        env:
          ECR_REGISTRY: ${{ env.ECR_REGISTRY }}
          IMAGE_TAG: ${{ github.sha }}
          ACM_CERTIFICATE_ARN: ${{ vars.ACM_CERTIFICATE_ARN }}
        run: |
          cd ops/k8s/overlays/prod
          envsubst < kustomization.yaml > kustomization.yaml.tmp && mv kustomization.yaml.tmp kustomization.yaml
          kustomize build . | yq eval-all 'select(.metadata.name == "auth-dpl" or .metadata.name == "auth-srv")' - | kubectl apply -f - --server-side

