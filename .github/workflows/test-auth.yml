########################################################
# Auth Service Test workflow for BigTix platform microservices E-Commerce project
#
# @since cicd-updates--JP
########################################################

name: test-auth

on:
  pull_request:
    paths:
      - 'auth-srv/**'
      - 'packages/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - run: make bs
      - run: cd auth-srv && npm install && npm run test:ci
