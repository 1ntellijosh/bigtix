########################################################
# Orders Service Test workflow for BigTix platform microservices E-Commerce project
#
# @since cicd-updates--JP
########################################################

name: test-orders

on:
  pull_request:
    paths:
      - 'orders-srv/**'
      - 'packages/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - run: make bs
      - run: cd orders-srv && npm install && npm run test:ci