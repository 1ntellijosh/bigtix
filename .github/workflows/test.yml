########################################################
# Test workflow for BigTix platform microservices E-Commerce project
#
# @since cicd-updates--JP
########################################################

name: test

on:
  pull_request

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - run: make bs
      - run: cd auth-srv && npm install && npm run test:ci
      - run: cd tickets-srv && npm install && npm run test:ci
      - run: cd orders-srv && npm install && npm run test:ci
      - run: cd payments-srv && npm install && npm run test:ci
