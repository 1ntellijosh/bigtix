# ------------------------------------------------------------------------------------------------
# kustomization file for BigTix platform microservices E-Commerce project production environment
# Prod uses ALB ingress only. Base no longer includes nginx ingress (see overlays/dev for local).
# @since github-deploy--JP
# ------------------------------------------------------------------------------------------------

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - storageclass-ebs-csi.yml
  - ingress-alb.yml

# ECR_REGISTRY and IMAGE_TAG are substituted in CI (envsubst) before kubectl apply -k
images:
  - name: 1ntellijosh/bigtix-auth-srv
    newName: ${ECR_REGISTRY}/bigtix/auth-srv
    newTag: ${IMAGE_TAG}
  - name: 1ntellijosh/bigtix-tickets-srv
    newName: ${ECR_REGISTRY}/bigtix/tickets-srv
    newTag: ${IMAGE_TAG}
  - name: 1ntellijosh/bigtix-orders-srv
    newName: ${ECR_REGISTRY}/bigtix/orders-srv
    newTag: ${IMAGE_TAG}
  - name: 1ntellijosh/bigtix-payments-srv
    newName: ${ECR_REGISTRY}/bigtix/payments-srv
    newTag: ${IMAGE_TAG}
  - name: 1ntellijosh/bigtix-client
    newName: ${ECR_REGISTRY}/bigtix/client
    newTag: ${IMAGE_TAG}
  - name: 1ntellijosh/bigtix-rabbitmq
    newName: ${ECR_REGISTRY}/bigtix/rabbitmq
    newTag: ${IMAGE_TAG}
  # Base uses local image for Kind; prod replaces with ECR.
  - name: bigtix-rabbitmq:3.13-management
    newName: ${ECR_REGISTRY}/bigtix/rabbitmq
    newTag: ${IMAGE_TAG}