# ------------------------------------------------------------------------------------------------
# auth-mongo-srv mongo-db k8s StatefulSet file for BigTix platform microservices E-Commerce project
#
# @since auth-micro-start--JP
# ------------------------------------------------------------------------------------------------

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: auth-mongo-dpl
  namespace: default
spec:
  serviceName: auth-mongo-headless
  replicas: 1
  selector:
    matchLabels:
      app: auth-mongo
  template:
    metadata:
      labels:
        app: auth-mongo
    spec:
      containers:
        - name: auth-mongo
          image: mongo
          volumeMounts:
            - name: data
              mountPath: /data/db
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        storageClassName: ebs-csi-gp2
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: auth-mongo-headless
  namespace: default
spec:
  clusterIP: None
  selector:
    app: auth-mongo
  ports:
    - name: db
      port: 27017
      targetPort: 27017
---

apiVersion: v1
kind: Service
metadata:
  name: auth-mongo-srv
spec:
  selector:
    app: auth-mongo
  ports:
    - name: db
      protocol: TCP
      port: 27017 # Default MongoDB port
      targetPort: 27017 # Default MongoDB port